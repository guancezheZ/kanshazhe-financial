<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f0e4"/>
      <stop offset="100%" stop-color="#e8e0d0"/>
    </linearGradient>
  </defs>
  <!-- 宣纸底色 -->
  <rect width="1024" height="1024" rx="180" fill="url(#bg)"/>
  <!-- 印章边框 -->
  <rect x="120" y="120" width="784" height="784" rx="60" fill="none" stroke="#4a3a2a" stroke-width="24"/>
  <rect x="156" y="156" width="712" height="712" rx="44" fill="none" stroke="#4a3a2a" stroke-width="8" stroke-opacity="0.4"/>
  <!-- 観 字 -->
  <text x="512" y="580" font-size="520" font-weight="500" fill="#4a3a2a" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif">観</text>
  <!-- 底部装饰线（印章风格） -->
  <line x1="280" y1="720" x2="744" y2="720" stroke="#4a3a2a" stroke-width="6" stroke-opacity="0.35" stroke-linecap="round"/>
  <line x1="340" y1="750" x2="684" y2="750" stroke="#4a3a2a" stroke-width="4" stroke-opacity="0.25" stroke-linecap="round"/>
</svg>
