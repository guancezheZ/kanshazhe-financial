<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🔑 密钥管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;background:#080816;color:#e0e0f0;min-height:100vh;overflow-x:hidden}
/* 动态粒子背景 */
#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;overflow:hidden}
#bg span{position:absolute;display:block;width:4px;height:4px;background:rgba(102,177,255,0.15);border-radius:50%;animation:float linear infinite}
@keyframes float{0%{transform:translateY(100vh) rotate(0deg);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-10vh) rotate(720deg);opacity:0}}
/* 主容器 */
.container{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:24px}
/* 玻璃卡片 */
.glass{background:rgba(20,20,40,0.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.06);border-radius:20px;padding:28px;margin-bottom:16px;transition:all .4s cubic-bezier(.4,0,.2,1)}
.glass:hover{border-color:rgba(102,177,255,0.12);box-shadow:0 8px 40px rgba(0,0,0,0.3)}
.glass-glass{background:rgba(255,255,255,0.03);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.04)}
/* 标题 */
h1{font-size:26px;font-weight:700;background:linear-gradient(135deg,#fff 0%,#66b1ff 50%,#b388ff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-0.5px}
.sub{color:rgba(255,255,255,0.35);font-size:13px;margin:4px 0 0 0;letter-spacing:0.3px}
/* 统计网格 */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.stat-card{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);border-radius:16px;padding:20px 16px;text-align:center;transition:all .4s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent,#66b1ff),transparent);opacity:0;transition:opacity .4s}
.stat-card:hover::before{opacity:1}
.stat-card:hover{transform:translateY(-4px);border-color:rgba(255,255,255,0.08);box-shadow:0 12px 40px rgba(0,0,0,0.2)}
.stat-card .icon{font-size:24px;margin-bottom:8px}
.stat-card .num{font-size:32px;font-weight:700;letter-spacing:-1px;margin-bottom:2px}
.stat-card .lbl{font-size:12px;color:rgba(255,255,255,0.35);font-weight:500;letter-spacing:0.5px}
.stat-card.gold{--accent:#ffd700}.stat-card.gold .num{color:#ffd700}
.stat-card.blue{--accent:#66b1ff}.stat-card.blue .num{color:#66b1ff}
.stat-card.green{--accent:#4ae}.stat-card.green .num{color:#4ae}
.stat-card.red{--accent:#f55}.stat-card.red .num{color:#f55}
.stat-card.purple{--accent:#b388ff}.stat-card.purple .num{color:#b388ff}
/* 输入框按钮 */
input,select,button{padding:10px 16px;border-radius:12px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.04);color:#e0e0f0;font-size:13px;outline:none;transition:all .3s cubic-bezier(.4,0,.2,1);font-family:inherit}
input:focus,select:focus{border-color:rgba(102,177,255,0.3);box-shadow:0 0 0 4px rgba(102,177,255,0.05);background:rgba(255,255,255,0.06)}
button{background:linear-gradient(135deg,#1a5bbf,#4080df);border:none;cursor:pointer;font-weight:600;letter-spacing:0.3px;padding:10px 24px;position:relative;overflow:hidden}
button::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(255,255,255,0.1) 0%,transparent 60%);opacity:0;transition:opacity .4s}
button:hover::after{opacity:1}
button:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(26,91,191,0.25)}
button:active{transform:translateY(0)}
button.d{background:linear-gradient(135deg,#6a1a1a,#b52a2a)}
button.d:hover{box-shadow:0 8px 30px rgba(181,42,42,0.25)}
button.s{background:linear-gradient(135deg,#1a6a3a,#2a9a4a)}
button.s:hover{box-shadow:0 8px 30px rgba(42,154,74,0.25)}
/* 表格 */
.table-wrap{overflow-x:auto;margin-top:8px;border-radius:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{color:rgba(255,255,255,0.3);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:1px;padding:14px 12px;border-bottom:1px solid rgba(255,255,255,0.04)}
td{padding:14px 12px;border-bottom:1px solid rgba(255,255,255,0.02);transition:background .2s}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}
/* 状态徽标 */
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:500;letter-spacing:0.3px}
.badge.online{background:rgba(68,170,238,0.1);color:#4ae;border:1px solid rgba(68,170,238,0.15)}
.badge.recent{background:rgba(255,215,0,0.08);color:#ffd700;border:1px solid rgba(255,215,0,0.12)}
.badge.offline{background:rgba(100,100,120,0.08);color:#99a;border:1px solid rgba(100,100,120,0.1)}
.badge.revoked{background:rgba(255,85,85,0.08);color:#f55;border:1px solid rgba(255,85,85,0.1)}
.badge.unused{background:rgba(100,100,120,0.05);color:#666;border:1px solid rgba(100,100,120,0.06)}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.dot.green{background:#4ae;box-shadow:0 0 12px rgba(68,170,238,0.4)}
.dot.yellow{background:#ffd700;box-shadow:0 0 12px rgba(255,215,0,0.3)}
.dot.gray{background:#99a}
.dot.red{background:#f55}
/* 动画 */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.fade-in{animation:fadeUp .5s cubic-bezier(.4,0,.2,1) both}
.fade-in-d1{animation-delay:0.05s}
.fade-in-d2{animation-delay:0.1s}
.fade-in-d3{animation-delay:0.15s}
/* 登录 */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{width:400px;padding:48px 40px;text-align:center}
.login-box h2{font-size:20px;margin-bottom:8px}
.login-box .sub{margin-bottom:28px}
.login-box .field{text-align:left;margin-bottom:16px}
.login-box .field label{font-size:12px;color:rgba(255,255,255,0.3);display:block;margin-bottom:6px;letter-spacing:0.5px;text-transform:uppercase}
.login-box .field input{width:100%}
.login-box button{width:100%;padding:12px;margin-top:8px;font-size:14px}
.login-box .logo{font-size:48px;margin-bottom:16px}
/* Toast消息 */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(20,20,40,0.95);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:14px 28px;font-size:13px;z-index:999;display:none;animation:slideUp .4s cubic-bezier(.4,0,.2,1);box-shadow:0 8px 40px rgba(0,0,0,0.3)}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
/* 头部栏 */
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;animation:slideDown .4s ease}
.header .right{display:flex;align-items:center;gap:12px}
#clock{font-size:12px;color:rgba(255,255,255,0.2);font-family:monospace;letter-spacing:0.5px}
/* 搜索操作栏 */
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.toolbar input[type=text]{flex:1;min-width:150px}
.toolbar select{padding:10px 14px;min-width:120px}
/* 空状态 */
.empty{text-align:center;padding:60px 20px;color:rgba(255,255,255,0.15)}
.empty .icon{font-size:56px;margin-bottom:16px;opacity:0.3}
.empty p{font-size:14px}
/* 复制按钮 */
.copy{cursor:pointer;opacity:0.2;margin-left:8px;transition:all .2s;font-size:12px;user-select:none;padding:2px 6px;border-radius:4px}
.copy:hover{opacity:1;background:rgba(255,255,255,0.05)}
/* 吊销链接 */
.revoke-link{color:#f55;font-size:12px;text-decoration:none;padding:4px 10px;border-radius:6px;transition:all .2s;white-space:nowrap}
.revoke-link:hover{background:rgba(255,85,85,0.1)}
td:last-child{white-space:nowrap;text-align:center}
.hide{display:none!important}
.flex{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.between{justify-content:space-between}
.mb12{margin-bottom:12px}
.mt12{margin-top:12px}
/* 密钥生成区 */
.gen-area{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.gen-area .label{font-size:13px;font-weight:500}
.gen-area input[type=number]{width:70px;text-align:center}
.gen-result{font-size:12px;color:rgba(255,255,255,0.25);padding-top:6px;display:none}
.gen-result.show{display:block}
/* 设备信息 */
.device-item{font-size:11px;color:rgba(255,255,255,0.4);margin:3px 0;display:flex;align-items:center;gap:6px}
.device-fp{font-family:monospace;color:rgba(255,255,255,0.25)}
/* 时间信息 */
.time-cell{font-size:11px;color:rgba(255,255,255,0.35)}
.time-cell .full{font-size:10px;color:rgba(255,255,255,0.15);margin-top:2px}

/* ═══ 密钥列表 — 固定头部 ═══ */
.keys-glass{display:flex;flex-direction:column}
.keys-header{position:sticky;top:0;z-index:2;padding:24px 24px 0;background:rgba(20,20,40,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.04)}
.keys-glass .table-wrap{flex:1;overflow-y:auto;padding:0 24px 24px}
.keys-glass thead th{position:sticky;top:0;z-index:1;background:rgba(20,20,40,0.95);backdrop-filter:blur(20px)}

/* ═══ Tab 面板 ═══ */
.tab-panel{display:none}
.tab-panel.active{display:block}
/* 底部导航栏 — 仅移动端显示 */
.tab-bar{display:none;position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(12,12,28,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,0.06);padding:4px 0;justify-content:space-around;align-items:center;height:56px}
.tab-bar .tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0;border:none;background:transparent;color:rgba(255,255,255,0.25);font-size:10px;font-weight:500;cursor:pointer;transition:all .2s;border-radius:0;letter-spacing:0.2px}
.tab-bar .tab-btn .tab-icon{font-size:20px;line-height:1}
.tab-bar .tab-btn.active{color:#66b1ff}
.tab-bar .tab-btn.active .tab-icon{transform:scale(1.05)}
/* 桌面端始终显示所有面板 */
@media(min-width:769px){
  .tab-panel{display:block!important}
  .tab-bar{display:none!important}
  .keys-glass{max-height:none}
}

/* ═══ 移动端适配 ═══ */
@media(max-width:768px){
  .container{padding:12px}
  .glass{padding:16px;border-radius:14px}
  .header{flex-direction:column;align-items:flex-start;gap:10px}
  .header .right{width:100%;justify-content:space-between}
  .grid{grid-template-columns:repeat(3,1fr);gap:8px}
  .stat-card{padding:14px 8px}
  .stat-card .num{font-size:24px}
  .stat-card .lbl{font-size:10px}
  .gen-area{width:100%;flex-direction:column;align-items:stretch}
  .gen-area>div{width:100%;justify-content:center}
  .gen-area button{width:100%;padding:14px 24px;font-size:15px}
  .toolbar input[type=text]{min-width:0;width:100%}
  .toolbar select{min-width:0;flex:1}
  .toolbar{flex-direction:column;gap:8px}
  .toolbar>input,.toolbar>select,.toolbar>button{width:100%}
  input,select,button{padding:12px 14px;font-size:15px;border-radius:10px}
  .between.flex{flex-direction:column;align-items:flex-start;gap:8px}
  #clock{font-size:10px;margin-top:0}
  h1{font-size:20px}
  /* 表格精简：隐藏非关键列 */
  table{font-size:12px}
  th:nth-child(1),td:nth-child(1){display:none}  /* #序号 */
  th:nth-child(4),td:nth-child(4){display:none}  /* 绑定设备 */
  th:nth-child(5),td:nth-child(5){display:none}  /* 最后在线 */
  th:nth-child(6),td:nth-child(6){display:none}  /* 导入时间 */
  th,td{padding:10px 8px}
  td:nth-child(2){font-size:12px;word-break:break-all;letter-spacing:0}
  /* 底部导航 */
  .tab-bar{display:flex}
  .container{padding-bottom:72px}
  /* 密钥列表滚动 */
  .keys-glass{max-height:calc(100vh - 170px)}
  .keys-header{padding:16px 16px 0}
  .keys-glass .table-wrap{padding:0 16px 16px}
  .keys-glass thead th{top:0}
  /* 登录页 */
  .login-box{width:100%;max-width:380px;padding:32px 24px}
  #bg{display:none}  /* 关闭粒子背景节省性能 */
}
@media(max-width:480px){
  .grid{grid-template-columns:repeat(2,1fr)}
  .container{padding:8px}
  .glass{padding:12px;border-radius:12px}
  h1{font-size:18px}
  th,td{padding:8px 6px}
  .badge{padding:3px 10px;font-size:11px}
  .copy{padding:4px 10px;margin-left:4px;font-size:14px}
  .revoke-link{padding:6px 12px;font-size:13px}
  .stat-card .num{font-size:20px}
  .stat-card{padding:12px 6px}
}
</style>
</head>
<body>
<!-- 粒子背景 -->
<div id="bg"></div>

<div id="login" class="login-wrap">
  <div class="glass login-box fade-in">
    <div class="logo">🔑</div>
    <h2 style="background:linear-gradient(135deg,#fff,#66b1ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent">密钥管理后台</h2>
    <p class="sub">观测者财务模拟系统</p>
    <div class="field"><label>Worker 地址</label><input id="wu" value="https://jiaqinw.xyz"></div>
    <div class="field"><label>管理员令牌</label><input id="tok" type="password" onkeydown="if(event.key==='Enter')login()"></div>
    <button onclick="login()" id="loginBtn">🔐 进入后台</button>
  </div>
</div>

<div id="app" class="hide">
  <div class="container">
    <div class="header">
      <div><h1>密钥管理</h1><div class="sub">观测者财务模拟系统 · 激活码后台</div></div>
      <div class="right">
        <span id="clock"></span>
        <button class="d" onclick="logout()" style="font-size:11px;padding:8px 16px">✕ 退出</button>
      </div>
    </div>

    <!-- ══ 概览 ══ -->
    <div id="panel-overview" class="tab-panel active">
      <div class="glass fade-in" style="padding:24px">
        <div class="grid" id="stats"></div>
      </div>
      <div class="glass fade-in" style="padding:18px 24px 14px;background:linear-gradient(135deg,rgba(26,106,58,0.05),rgba(26,91,191,0.05))">
        <div class="between flex" style="margin-bottom:0;align-items:center">
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:28px">🚀</span>
            <div><strong style="font-size:16px;background:linear-gradient(135deg,#4ae,#2a9a4a);-webkit-background-clip:text;-webkit-text-fill-color:transparent">生成新密钥</strong>
            <div style="font-size:12px;color:rgba(255,255,255,0.25);margin-top:2px">自动上传到 Cloudflare Worker</div></div>
          </div>
          <div class="gen-area">
            <div style="display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.04);border-radius:12px;padding:4px 12px">
              <span style="font-size:13px;color:rgba(255,255,255,0.4)">数量</span>
              <input id="n" type="number" value="10" min="1" max="100" style="width:55px;text-align:center;padding:6px 8px;border-radius:8px">
            </div>
            <button class="s" onclick="gen()" style="padding:10px 24px;font-size:13px">✨ 生成并上传</button>
          </div>
        </div>
        <div class="gen-result" id="gr"></div>
      </div>
    </div>

    <!-- ══ 密钥列表 ══ -->
    <div id="panel-keys" class="tab-panel">
      <div class="glass keys-glass fade-in" style="padding:0;overflow:hidden">
        <div class="keys-header">
          <div class="between flex" style="margin-bottom:4px">
            <strong style="font-size:15px">📋 密钥列表</strong>
            <span id="keyCount" style="font-size:12px;color:rgba(255,255,255,0.2)"></span>
          </div>
          <div class="toolbar">
            <select id="sf" onchange="render()">
              <option value="all">📊 全部密钥</option>
              <option value="online">🟢 在线</option>
              <option value="recent">🟡 近期活跃</option>
              <option value="offline">🔴 离线</option>
              <option value="unused">⚪ 未使用</option>
              <option value="revoked">❌ 已吊销</option>
            </select>
            <input id="q" placeholder="🔍 搜索激活码..." oninput="render()">
            <button onclick="load()" style="font-size:11px;padding:8px 16px">🔄 刷新</button>
          </div>
        </div>
        <div class="table-wrap" style="overflow-y:auto;border-radius:0">
          <table><thead><tr>
            <th style="width:24px">#</th>
            <th>激活码</th>
            <th>状态</th>
            <th>绑定设备</th>
            <th>最后在线</th>
            <th>导入时间</th>
            <th style="width:50px"></th>
          </tr></thead>
          <tbody id="kt"></tbody></table>
        </div>
      </div>
    </div>
  </div>

  <!-- ══ 底部导航 ══ -->
  <div class="tab-bar">
    <button class="tab-btn active" data-panel="overview"><span class="tab-icon">📊</span>概览</button>
    <button class="tab-btn" data-panel="keys"><span class="tab-icon">📋</span>密钥</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// 粒子背景
(function(){
  var c = document.getElementById('bg')
  for (var i = 0; i < 40; i++) {
    var s = document.createElement('span')
    s.style.left = Math.random() * 100 + '%'
    s.style.width = s.style.height = (1 + Math.random() * 3) + 'px'
    s.style.animationDuration = (10 + Math.random() * 30) + 's'
    s.style.animationDelay = (Math.random() * 20) + 's'
    s.style.opacity = 0.1 + Math.random() * 0.3
    c.appendChild(s)
  }
})()

var API = '', TOKEN = '', DATA = {}

function msg(s, ok) {
  var e = document.getElementById('toast')
  e.textContent = (ok ? '✅ ' : '❌ ') + s
  e.style.borderColor = ok ? 'rgba(68,170,238,0.2)' : 'rgba(255,85,85,0.2)'
  e.style.display = 'block'
  setTimeout(function(){ e.style.display = 'none' }, 3000)
}

function clock() {
  document.getElementById('clock').textContent = new Date().toLocaleString()
}
setInterval(clock, 1000); clock()

async function call(cmd, body) {
  try {
    var u = API + '/kapi?cmd=' + cmd + '&token=' + encodeURIComponent(TOKEN)
    var o = { headers: { Authorization: TOKEN } }
    if (body) { o.method = 'POST'; o.body = JSON.stringify(body) }
    var r = await fetch(u, o)
    if (!r.ok) return { error: 'HTTP ' + r.status }
    return r.json()
  } catch(e) { return { error: e.message } }
}

function login() {
  API = document.getElementById('wu').value.replace(/\/+$/, '')
  TOKEN = document.getElementById('tok').value.trim()
  if (!API || !TOKEN) { msg('请输入地址和令牌', false); return }
  document.getElementById('loginBtn').textContent = '⏳ 验证中...'
  load()
}

function logout() {
  document.getElementById('login').style.display = 'flex'
  document.getElementById('app').classList.add('hide')
}

async function load() {
  var r = await call('stats')
  if (r.error) { msg('登录失败: ' + r.error, false); document.getElementById('loginBtn').textContent = '🔐 进入后台'; return }
  DATA = r
  document.getElementById('login').style.display = 'none'
  document.getElementById('app').classList.remove('hide')
  stats(); render()
  document.getElementById('loginBtn').textContent = '🔐 进入后台'
}

function timeAgo(t) {
  if (!t) return null
  var diff = Date.now() - new Date(t).getTime()
  if (diff < 60000) return '刚刚'
  if (diff < 3600000) return Math.floor(diff/60000) + '分钟前'
  if (diff < 86400000) return Math.floor(diff/3600000) + '小时前'
  return Math.floor(diff/86400000) + '天前'
}

function onlineStatus(t) {
  if (!t) return null
  var diff = Date.now() - new Date(t).getTime()
  if (diff < 300000) return 'online'
  if (diff < 86400000) return 'recent'
  return 'offline'
}

function stats() {
  var d = DATA, now = Date.now()
  var online = 0, recent = 0, offlineTotal = 0
  Object.keys(d.records||{}).forEach(function(k){
    var r = d.records[k]
    if (r.revoked) return
    if (!r.fps || !r.fps.length) return
    var lastSeen = null
    r.fps.forEach(function(f){ if (f.lastSeen && (!lastSeen || f.lastSeen > lastSeen)) lastSeen = f.lastSeen })
    if (!lastSeen) { offlineTotal++; return }
    var diff = now - new Date(lastSeen).getTime()
    if (diff < 300000) online++
    else if (diff < 86400000) recent++
    else offlineTotal++
  })
  var unused = (d.total||0) - (d.activated||0) - (d.revoked||0)
  var items = [
    {icon:'🔑', num:d.total||0, lbl:'密钥总数', cls:'gold'},
    {icon:'🟢', num:online, lbl:'在线', cls:'green'},
    {icon:'🟡', num:recent, lbl:'近期活跃', cls:'gold'},
    {icon:'🔴', num:offlineTotal, lbl:'离线', cls:'red'},
    {icon:'⚪', num:unused, lbl:'未使用', cls:'purple'},
  ]
  var h = ''
  items.forEach(function(x){ h += '<div class="stat-card ' + x.cls + '"><div class="icon">' + x.icon + '</div><div class="num">' + x.num + '</div><div class="lbl">' + x.lbl + '</div></div>' })
  document.getElementById('stats').innerHTML = h
}

function render() {
  var q = (document.getElementById('q').value||'').toUpperCase()
  var sf = document.getElementById('sf').value
  var rec = DATA.records || {}
  var ks = Object.keys(rec).filter(function(k){ return k.includes(q) }).sort()
  var now = Date.now()
  var h = '', idx = 0
  for (var i = 0; i < ks.length; i++) {
    var k = ks[i], r = rec[k]
    var revoked = r.revoked
    var fps = r.fps || []
    var hasFp = fps.length > 0
    var lastSeen = null
    fps.forEach(function(f){ if (f.lastSeen && (!lastSeen || f.lastSeen > lastSeen)) lastSeen = f.lastSeen })
    var os = onlineStatus(lastSeen)
    if (sf === 'online' && os !== 'online') continue
    if (sf === 'recent' && os !== 'recent') continue
    if (sf === 'offline' && os !== 'offline' && !(hasFp && !lastSeen)) continue
    if (sf === 'unused' && (hasFp || revoked)) continue
    if (sf === 'revoked' && !revoked) continue
    idx++
    var stCls, stLbl, dotCls
    if (revoked) { stCls='revoked'; stLbl='已吊销'; dotCls='red' }
    else if (os === 'online') { stCls='online'; stLbl='在线'; dotCls='green' }
    else if (os === 'recent') { stCls='recent'; stLbl='近期活跃'; dotCls='yellow' }
    else if (hasFp) { stCls='offline'; stLbl='离线'; dotCls='gray' }
    else { stCls='unused'; stLbl='未使用'; dotCls='gray' }
    var statusHtml = '<span class="badge ' + stCls + '"><span class="dot ' + dotCls + '"></span>' + stLbl + '</span>'
    var fpHtml = ''
    fps.forEach(function(f){
      var fp = (f.fp||'').slice(0,16)
      var pf = f.platform || ''
      fpHtml += '<div class="device-item">🖥 <span class="device-fp">' + fp + '</span>' + (pf ? ' · ' + pf : '') + '</div>'
    })
    if (!fpHtml && !revoked) fpHtml = '<span style="color:rgba(255,255,255,0.08);font-size:12px">未绑定</span>'
    var lastHtml = lastSeen ? '<div class="time-cell">' + timeAgo(lastSeen) + '<div class="full">' + new Date(lastSeen).toLocaleString() + '</div></div>' : '<span style="color:rgba(255,255,255,0.08)">—</span>'
    var tm = r.importedAt ? '<div class="time-cell">' + new Date(r.importedAt).toLocaleString() + '</div>' : '<span style="color:rgba(255,255,255,0.08)">—</span>'
    var rb = revoked ? '' : '<a href="#" class="revoke-link" onclick="if(confirm(\'吊销 ' + k + ' ？\')){revoke(\'' + k + '\')};return false">吊销</a>'
    h += '<tr style="animation:fadeUp .3s ease both;animation-delay:' + (i*0.015) + 's"><td style="color:rgba(255,255,255,0.15);font-size:12px">' + idx + '</td>' +
      '<td style="font-family:monospace;font-size:14px;font-weight:500;letter-spacing:0.5px">' + k + '<span class="copy" onclick="copyKey(\'' + k + '\')">📋</span></td>' +
      '<td>' + statusHtml + '</td>' +
      '<td>' + (fpHtml || '') + '</td>' +
      '<td>' + lastHtml + '</td>' +
      '<td>' + tm + '</td>' +
      '<td style="text-align:center">' + rb + '</td></tr>'
  }
  document.getElementById('kt').innerHTML = h || '<tr><td colspan="7"><div class="empty"><div class="icon">🔮</div><p>没有找到匹配的密钥</p></div></td></tr>'
  document.getElementById('keyCount').textContent = '共 ' + idx + ' 条'
}

function gen() {
  var n = parseInt(document.getElementById('n').value) || 10
  var cs = []
  for (var i = 0; i < n; i++) cs.push(mkCode())
  var gr = document.getElementById('gr')
  gr.classList.add('show')
  gr.textContent = '⏳ 正在生成 ' + n + ' 个密钥并上传...'
  call('import', { codes: cs }).then(function(r){
    if (r.success) {
      msg('✨ 成功导入 ' + r.imported + '/' + n + ' 个密钥')
      gr.textContent = '✅ 已导入 ' + r.imported + ' 个'
      load()
    } else {
      msg('导入失败: ' + (r.error || '?'), false)
      gr.textContent = '❌ 失败'
    }
  })
}

function mkCode() {
  var h = '0123456789ABCDEF', c = []
  for (var i = 0; i < 12; i++) c.push(h[Math.floor(Math.random() * 16)])
  var x = 0
  for (var i = 0; i < 12; i++) x ^= parseInt(c[i], 16)
  c.push(h[(x >> 8) & 0xF], h[(x >> 4) & 0xF], h[x & 0xF], h[Math.floor(Math.random() * 16)])
  return c.join('').replace(/(.{4})/g, '$1-').slice(0, 19)
}

function revoke(c) {
  call('revoke', { code: c }).then(function(r){
    if (r.success) { msg('已吊销 ' + c); load() }
    else msg('吊销失败', false)
  })
}

function copyKey(c) {
  navigator.clipboard.writeText(c).then(function(){ msg('📋 已复制: ' + c) })
}

/* ═══ Tab 切换 ═══ */
document.querySelectorAll('.tab-btn').forEach(function(btn){
  btn.addEventListener('click', function(){
    var panel = this.getAttribute('data-panel')
    document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active') })
    this.classList.add('active')
    document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.remove('active') })
    document.getElementById('panel-' + panel).classList.add('active')
  })
})
</script>
